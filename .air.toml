root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server serve"
  delay = 1000
  include_ext = ["go"]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["tmp", "sveltekit", "pb_data", "pb_public", "vendor"]
  exclude_regex = ["_test\\.go$"]

[log]
  time = false

[misc]
  clean_on_exit = true
